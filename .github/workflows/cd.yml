name: CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  RENSA_IMAGE_REGISTRY: ghcr.io
  RENSA_IMAGE_NAMESPACE: ${{ github.repository_owner }}
  RENSA_IMAGE_TAG: ${{ github.sha }}
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
  NEXT_PUBLIC_ELYSIA_WS_URL: ${{ vars.NEXT_PUBLIC_ELYSIA_WS_URL || 'ws://localhost:3002' }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
  NEXT_PUBLIC_EXPLORE_SOURCE: ${{ vars.NEXT_PUBLIC_EXPLORE_SOURCE || 'database' }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: docker compose -f docker-compose-production.yaml build web notifications ai exif

      - name: Push images
        run: docker compose -f docker-compose-production.yaml push web notifications ai exif

  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SSH_DEPLOY == 'true' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ vars.VPS_APP_DIR || '/opt/rensa' }}"
            git pull --ff-only
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            RENSA_IMAGE_REGISTRY=ghcr.io \
            RENSA_IMAGE_NAMESPACE=${{ github.repository_owner }} \
            RENSA_IMAGE_TAG=${{ github.sha }} \
            docker compose -f docker-compose-production.yaml pull
            RENSA_IMAGE_REGISTRY=ghcr.io \
            RENSA_IMAGE_NAMESPACE=${{ github.repository_owner }} \
            RENSA_IMAGE_TAG=${{ github.sha }} \
            docker compose -f docker-compose-production.yaml up -d
            docker image prune -f
